<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div class="cart-page">
    <div class="cart-card">
        <h2>Your Cart</h2>

        <div id="emptyCart" class="no-results" style="display:none;">
            Your cart is empty
        </div>

        <div id="cartItems"></div>

        <div class="cart-summary">
            <strong>Total:</strong>
            <span id="total">₹ 0</span>
        </div>

        <button id="checkoutBtn" class="checkout-btn" onclick="checkout()">
            Checkout
        </button>

        <button class="cart-btn" onclick="goBackToShopping()">
            ← Back to shopping
        </button>
    </div>
</div>


<script src="../static/script.js"></script>
<div id="statusMsg" class="status-msg"></div>

</body>
</html>
